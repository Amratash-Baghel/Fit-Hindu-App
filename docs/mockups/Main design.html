<title>Fit Hindu — v1 Mockups (6 core screens)</title>
<style>
  :root{
    --ink-black:#0F0B07; --surface:#1C1510; --surface-2:#28201A;
    --saffron:#F0761E; --saffron-deep:#B84A16;
    --gold:#D9A441; --gold-hi:#F2C879;
    --cream:#F6EDDD; --muted:#A8917A; --line:#3A2E24;
    --night:#0B0E1A; --night-surface:#151A2E;
    --ok:#7CB07F;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--ink-black); color:var(--cream);
    font-family:"Nirmala UI","Noto Sans Devanagari","Mangal",system-ui,sans-serif;
    padding:28px 20px 48px;
  }
  .studio-head{max-width:1200px;margin:0 auto 6px}
  .studio-head h1{font-size:22px;font-weight:700;letter-spacing:.2px}
  .studio-head h1 em{font-style:normal;color:var(--saffron)}
  .studio-head p{color:var(--muted);font-size:13px;margin-top:4px;max-width:70ch}
  .rail{
    display:flex;gap:34px;overflow-x:auto;padding:26px 4px 18px;
    scroll-snap-type:x proximity;
  }
  .shot{scroll-snap-align:start;flex:0 0 auto}
  .shot > figcaption{
    text-align:center;color:var(--muted);font-size:12px;letter-spacing:1.4px;
    text-transform:uppercase;margin-bottom:12px;font-family:Consolas,monospace;
  }
  .phone{
    width:390px;height:844px;background:var(--ink-black);
    border:1px solid var(--line);border-radius:44px;overflow:hidden;
    position:relative;display:flex;flex-direction:column;
    box-shadow:0 30px 80px rgba(0,0,0,.55), 0 0 0 8px #060402;
  }
  .statusbar{
    height:44px;display:flex;align-items:center;justify-content:space-between;
    padding:0 26px;font-size:12px;color:var(--muted);flex:none;
    font-variant-numeric:tabular-nums;
  }
  .notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);
    width:118px;height:22px;background:#000;border-radius:12px}
  .body{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:8px 20px 0}

  /* ---------- shared components ---------- */
  .btn-gold{
    display:block;width:100%;text-align:center;padding:16px;
    background:linear-gradient(160deg,var(--gold-hi),var(--gold) 55%,#B07E2B);
    color:#241503;font-weight:700;font-size:17px;border-radius:14px;
    box-shadow:0 6px 22px rgba(217,164,65,.28);border:none;cursor:pointer;
  }
  .btn-gold small{display:block;font-weight:500;font-size:11px;opacity:.75}
  .btn-ghost{
    display:block;width:100%;text-align:center;padding:14px;border-radius:14px;
    border:1px solid var(--line);color:var(--muted);font-size:15px;background:none;
  }
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px}
  .chip{
    display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
    border-radius:999px;border:1px solid var(--line);font-size:13px;color:var(--muted)
  }
  .chip.on{background:rgba(240,118,30,.14);border-color:var(--saffron);color:var(--saffron);font-weight:700}
  .eyebrow{font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:700}
  .en{font-size:11px;color:var(--muted);letter-spacing:.4px}
  .disclaimer{
    font-size:10.5px;color:#7d6a58;line-height:1.5;border-top:1px solid var(--line);
    padding:10px 2px 12px;margin-top:auto;
  }
  .tabbar{
    flex:none;display:flex;justify-content:space-around;align-items:center;
    border-top:1px solid var(--line);padding:10px 6px 22px;background:#120D08;
  }
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;color:var(--muted)}
  .tab svg{width:22px;height:22px;stroke:var(--muted);fill:none;stroke-width:1.7}
  .tab.on{color:var(--saffron);font-weight:700}
  .tab.on svg{stroke:var(--saffron)}
  .diya{width:26px;height:26px}

  /* ---------- 1 · onboarding ---------- */
  .dots{display:flex;gap:8px;justify-content:center;margin:14px 0 26px}
  .dots i{width:8px;height:8px;border-radius:99px;background:var(--line)}
  .dots i.on{background:var(--saffron);width:22px}
  .q-hero{font-size:27px;font-weight:800;line-height:1.35;text-wrap:balance}
  .opt{
    display:flex;align-items:center;gap:14px;padding:17px 18px;margin-top:12px;
    border-radius:16px;border:1.5px solid var(--line);background:var(--surface);
    font-size:17px;font-weight:600;
  }
  .opt .en{display:block;font-weight:400;margin-top:2px}
  .opt.sel{border-color:var(--saffron);background:rgba(240,118,30,.10)}
  .opt.sel .tick{background:var(--saffron);border-color:var(--saffron)}
  .tick{width:22px;height:22px;border-radius:99px;border:1.5px solid var(--muted);
    flex:none;display:grid;place-items:center;color:#1b0f05;font-size:13px;font-weight:900}

  /* ---------- 2 · home ---------- */
  .greet h2{font-size:21px;font-weight:800}
  .greet .en{margin-top:2px}
  .shloka{
    padding:16px 18px;margin-top:14px;position:relative;overflow:hidden;
    background:linear-gradient(150deg,#241407,#1C1510 70%);
    border:1px solid #4a3416;border-radius:18px;
  }
  .shloka:before{content:"ॐ";position:absolute;right:-6px;top:-18px;font-size:92px;
    color:rgba(217,164,65,.08);font-weight:700}
  .shloka .sansk{font-size:15.5px;line-height:1.65;color:var(--gold-hi);font-weight:600}
  .shloka .mean{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
  .streak{display:flex;align-items:center;gap:10px;margin-top:14px;padding:12px 16px}
  .streak .n{font-size:26px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums}
  .streak .lbl{font-size:12px;color:var(--muted);line-height:1.35}
  .diyarow{display:flex;gap:5px;margin-left:auto}
  .today{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .t-card{display:flex;align-items:center;gap:14px;padding:13px 14px}
  .t-ico{width:46px;height:46px;border-radius:13px;flex:none;display:grid;place-items:center;
    background:rgba(240,118,30,.13);color:var(--saffron)}
  .t-ico.gold{background:rgba(217,164,65,.13);color:var(--gold)}
  .t-card b{font-size:15.5px;display:block}
  .t-card .en{margin-top:1px}
  .t-go{margin-left:auto;color:var(--saffron);font-size:20px}
  .t-done{margin-left:auto;color:var(--ok);font-size:13px;font-weight:700}

  /* ---------- 3 · workout ---------- */
  .video{
    height:250px;border-radius:20px;position:relative;overflow:hidden;flex:none;
    background:radial-gradient(120% 100% at 50% 0%,#2E1A08 0%,#160E06 70%);
    border:1px solid #4a3416;display:grid;place-items:center;margin-top:8px;
  }
  .avatar-note{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:1.4px;
    color:var(--gold);border:1px solid #4a3416;padding:4px 10px;border-radius:99px;
    background:rgba(15,11,7,.6);text-transform:uppercase}
  .play{width:66px;height:66px;border-radius:99px;display:grid;place-items:center;
    background:linear-gradient(160deg,var(--gold-hi),var(--gold));
    box-shadow:0 8px 30px rgba(217,164,65,.4)}
  .play svg{margin-left:4px}
  .ex-name{font-size:22px;font-weight:800;margin-top:16px}
  .setrow{display:flex;gap:10px;margin-top:12px}
  .setbox{flex:1;text-align:center;padding:11px 6px}
  .setbox b{font-size:19px;color:var(--saffron);font-variant-numeric:tabular-nums;display:block}
  .setbox span{font-size:11px;color:var(--muted)}
  .uplist{margin-top:14px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
  .uprow{display:flex;align-items:center;gap:12px;padding:10px 12px;font-size:14px}
  .uprow .n{width:26px;height:26px;border-radius:9px;background:var(--surface-2);
    display:grid;place-items:center;font-size:12px;color:var(--muted);flex:none;
    font-variant-numeric:tabular-nums}
  .uprow .dur{margin-left:auto;color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums}

  /* ---------- 4 · diet ---------- */
  .daytabs{display:flex;gap:8px;overflow:hidden;margin-top:8px}
  .meal{padding:15px 16px;margin-top:10px}
  .meal-head{display:flex;align-items:baseline;gap:10px}
  .meal-head b{font-size:16.5px}
  .meal-head .kcal{margin-left:auto;font-size:12px;color:var(--gold);font-variant-numeric:tabular-nums}
  .meal ul{list-style:none;margin-top:9px;display:flex;flex-direction:column;gap:7px}
  .meal li{display:flex;align-items:center;gap:9px;font-size:14px;color:#D9CBB8}
  .veg{width:13px;height:13px;border:1.5px solid var(--ok);border-radius:3px;flex:none;
    display:grid;place-items:center}
  .veg i{width:6px;height:6px;background:var(--ok);border-radius:99px}

  /* ---------- 5 · jap ---------- */
  .deities{display:flex;gap:8px;margin-top:12px;justify-content:center}
  .mala-wrap{display:grid;place-items:center;margin-top:24px}
  .mala{width:244px;height:244px;border-radius:50%;position:relative;display:grid;place-items:center;
    background:
      radial-gradient(closest-side,var(--ink-black) 78%,transparent 79%),
      conic-gradient(var(--saffron) 0deg 121deg, var(--surface-2) 121deg 360deg);
  }
  .mala:after{content:"";position:absolute;inset:-14px;border-radius:50%;
    border:1px dashed #4a3416}
  .mala .count{font-size:56px;font-weight:800;color:var(--gold-hi);font-variant-numeric:tabular-nums;line-height:1}
  .mala .of{font-size:13px;color:var(--muted);margin-top:6px}
  .mala-center{text-align:center}
  .jap-mantra{text-align:center;margin-top:18px;font-size:19px;font-weight:700;color:var(--saffron)}
  .jap-sub{text-align:center;font-size:12px;color:var(--muted);margin-top:4px}
  .soundrow{display:flex;gap:8px;justify-content:center;margin-top:16px}

  /* ---------- 6 · sleep ---------- */
  .phone.night{background:var(--night)}
  .phone.night .body{background:
    radial-gradient(90% 40% at 50% -5%,#1B2342 0%,transparent 70%)}
  .phone.night .card{background:var(--night-surface);border-color:#252D4A}
  .phone.night .tabbar{background:#080A14;border-color:#1C2340}
  .moon{font-size:44px;text-align:center;margin-top:18px}
  .sleep-h{text-align:center;font-size:22px;font-weight:800;margin-top:8px}
  .sleep-sub{text-align:center;font-size:12.5px;color:#8E96B8;margin-top:4px}
  .s-row{display:flex;align-items:center;gap:14px;padding:13px 15px;margin-top:9px}
  .s-ico{width:42px;height:42px;border-radius:12px;background:rgba(217,164,65,.10);
    display:grid;place-items:center;font-size:19px;flex:none}
  .s-row b{font-size:15px;display:block}
  .s-row .en{color:#8E96B8}
  .s-play{margin-left:auto;width:34px;height:34px;border-radius:99px;border:1px solid #2A3252;
    display:grid;place-items:center;color:var(--gold)}
  .s-timer{display:flex;align-items:center;justify-content:space-between;
    padding:13px 16px;margin-top:14px;font-size:14px}
  .s-timer b{color:var(--gold);font-variant-numeric:tabular-nums}
</style>

<header class="studio-head">
  <h1>Fit <em>Hindu</em> — v1 design, six core screens</h1>
  <p>Premium black · saffron · gold. Diya-glow on warm black; gold spent only on the primary
     action and the streak. Hindi is the voice, English whispers. Sleep shifts to night-indigo —
     same system, different hour of the day. Scroll →</p>
</header>

<!-- ════════ 4 · DIET ════════ -->
